<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任用試験 学習スライド ── 仏法入門</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;600;700;900&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=1">
</head>
<body>
  <!-- ナビゲーションバー -->
  <nav class="topbar">
    <div class="topbar-left">
      <span class="company-name">仏法入門 学習スライド</span>
    </div>
    <div class="topbar-right">
      <span class="slide-status" id="slideStatus"></span>
      <button class="menu-btn" id="menuBtn" aria-label="アジェンダ">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="2" y="5" width="16" height="2" rx="1" fill="currentColor"/>
          <rect x="2" y="9" width="16" height="2" rx="1" fill="currentColor"/>
          <rect x="2" y="13" width="16" height="2" rx="1" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- スライドステージ -->
  <div class="slide-stage" id="slideStage"></div>

  <!-- アジェンダサイドバー -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">もくじ</span>
      <button class="sidebar-close" id="sidebarClose">✕</button>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>

  <!-- トークスクリプトパネル -->
  <div class="notes-panel" id="notesPanel">
    <div class="notes-content" id="notesContent"></div>
  </div>

  <!-- スライドカウンター -->
  <div class="slide-counter" id="slideCounter"></div>

  <script src="js/slides.js?v=1"></script>
  <script src="js/app.js?v=1"></script>
</body>
</html>
